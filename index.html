<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechPulse Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1a2e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a4a;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #7c6af7;
    }

    .logo span { color: #00d4ff; }

    .reset-btn {
      background: transparent;
      border: 1px solid #7c6af7;
      color: #7c6af7;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: #7c6af7;
      color: white;
    }

    .chat-container {
      width: 100%;
      max-width: 780px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.95rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-bubble {
      background: #7c6af7;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot-bubble {
      background: #1e1e35;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a4a;
    }

    .search-tag {
      display: inline-block;
      background: #00d4ff22;
      color: #00d4ff;
      border: 1px solid #00d4ff44;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      margin-bottom: 8px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #7c6af7;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .input-area {
      width: 100%;
      max-width: 780px;
      padding: 16px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      background: #1e1e35;
      border: 1px solid #2a2a4a;
      color: #e0e0e0;
      padding: 12px 18px;
      border-radius: 25px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #7c6af7; }

    button#send {
      background: #7c6af7;
      border: none;
      color: white;
      padding: 12px 22px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    button#send:hover { background: #6a58e0; }
    button#send:disabled { background: #3a3a5a; cursor: not-allowed; }

    .welcome {
      text-align: center;
      margin: auto;
      color: #555577;
    }

    .welcome h2 { font-size: 1.5rem; color: #7c6af7; margin-bottom: 8px; }
    .welcome p { font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">Tech<span>Pulse</span> 🚀</div>
  <button class="reset-btn" onclick="resetChat()">New Chat</button>
</header>

<div class="chat-container" id="chat">
  <div class="welcome">
    <h2>TechPulse Agent</h2>
    <p>Ask me anything about AI/ML breakthroughs or Tech Startup news!</p>
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask about AI, startups, tech news..." onkeydown="if(event.key==='Enter') sendMessage()" />
  <button id="send" onclick="sendMessage()">Send ➤</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("send");

  function addBubble(text, type, searched=false, query="") {
    const bubble = document.createElement("div");
    bubble.className = `bubble ${type}-bubble`;

    if (type === "bot" && searched) {
      bubble.innerHTML = `<div class="search-tag">🔍 Searched: ${query}</div><br>${text.replace(/\n/g, "<br>")}`;
    } else {
      bubble.innerHTML = text.replace(/\n/g, "<br>");
    }

    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "bubble bot-bubble typing";
    div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // Clear welcome message
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    addBubble(text, "user");
    input.value = "";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      removeTyping();
      addBubble(data.reply, "bot", data.searched, data.query);
    } catch (e) {
      removeTyping();
      addBubble("Something went wrong. Try again!", "bot");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function resetChat() {
    await fetch("/reset", { method: "POST" });
    chat.innerHTML = `<div class="welcome"><h2>TechPulse Agent</h2><p>Ask me anything about AI/ML breakthroughs or Tech Startup news!</p></div>`;
  }
</script>
</body>
</html>
